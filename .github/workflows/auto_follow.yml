name: Auto Follow Teams

on:
  schedule:
    - cron: '*/5 * * * *' # Chạy tự động mỗi 5 phút
  workflow_dispatch: # Cho phép bấm chạy thủ công

jobs:
  run-script:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install "httpx[http2]"

      - name: Run Auto Follow Script
        env:
          AI_HACKS_TOKEN: ${{ secrets.AI_HACKS_TOKEN }}
        run: python auto_follow_github.py
